<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<title>后台</title>
</head>

<body>

<h2>后台</h2>

<h3>商品</h3>
<input id="name" placeholder="名称">
<input id="price" placeholder="价格">
<input id="stock" placeholder="库存">
<input id="category" placeholder="分类">
<input id="barcode" placeholder="条码">
<input id="img" placeholder="图片URL">

<label>
<input type="checkbox" id="enabled" checked> 上架
</label>

<h4>限时优惠</h4>
<input id="salePrice" placeholder="优惠价">
<input type="datetime-local" id="saleStart">
<input type="datetime-local" id="saleEnd">

<button onclick="addProduct()">添加</button>

<h3>公告</h3>
<input id="notice">
<button onclick="setNotice()">发布</button>

<h3>优惠券</h3>
<input id="code" placeholder="CODE">
<input id="discount" placeholder="0.1">
<input type="datetime-local" id="cstart">
<input type="datetime-local" id="cend">
<button onclick="addCoupon()">添加</button>

<script>

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB4c50tn2qusku-vKS_70Aox04q7q3G0kg",
  authDomain: "c4stationary.firebaseapp.com",
  projectId: "c4stationary",
  storageBucket: "c4stationary.firebasestorage.app",
  messagingSenderId: "732705187325",
  appId: "1:732705187325:web:15a9d0536f123fde2aa594",
  measurementId: "G-CJG2GQK4GD"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 商品
async function addProduct(){

  let sale = null;

  let sp = parseFloat(document.getElementById("salePrice").value);
  let ss = document.getElementById("saleStart").value;
  let se = document.getElementById("saleEnd").value;

  if(!isNaN(sp) && ss && se){
    sale = {price:sp,start:ss,end:se};
  }

  await db.collection("products").add({
    name: name.value,
    price: parseFloat(price.value),
    stock: parseInt(stock.value),
    category: category.value,
    barcode: barcode.value,
    img: img.value,
    enabled: enabled.checked,
    sale
  });
}

// 公告
async function setNotice(){
  let snap = await db.collection("notices").get();

  if(snap.empty){
    await db.collection("notices").add({text:notice.value});
  }else{
    await db.collection("notices").doc(snap.docs[0].id)
      .update({text:notice.value});
  }
}

// 优惠券
async function addCoupon(){
  await db.collection("coupons").add({
    code: code.value,
    discount: parseFloat(discount.value),
    start: cstart.value,
    end: cend.value
  });
}

</script>

</body>
</html>
