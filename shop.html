<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C4文具店</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

.header { background:#333; color:white; padding:15px; display:flex; justify-content:space-between; }

.notice {
  background:yellow;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.products {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card { background:white; padding:10px; border-radius:10px; text-align:center; }

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

button { padding:10px; margin:5px; }

.cart {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:15px;
  overflow:auto;
}

@media (max-width:600px){
  .products { grid-template-columns:1fr; }
  button { width:100%; }
  .cart { width:100%; height:50%; bottom:0; top:auto; }
}
</style>

</head>

<body>

<div class="header">
<h2>🛒 C4文具店</h2>
<div onclick="toggleCart()">购物车 (<span id="count">0</span>)</div>
</div>

<div class="notice" id="noticeBox"></div>

<div class="products" id="products"></div>

<div class="cart" id="cartBox" style="display:none">
<h3>购物车</h3>
<div id="cart"></div>

<input id="name" placeholder="你的名字"><br><br>

<h3 id="total"></h3>
<button onclick="checkout()">结账</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("noticeBox").innerText =
  localStorage.getItem("notice") || "暂无公告";

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderProducts(){
  const div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach(p=>{

    let now = new Date();
    let price = p.price;

    // 限时优惠🔥
    if(p.sale){
      if(now >= new Date(p.sale.start) && now <= new Date(p.sale.end)){
        price = p.sale.price;
      }
    }

    let status = "";
    let disabled = "";

    if(p.stock <= 0){
      status = "❌ 已售空";
      disabled = "disabled";
    }

    if(!p.enabled){
      status = "🚫 已下架";
      disabled = "disabled";
    }

    div.innerHTML += `
      <div class="card">
        <img src="${p.img || 'https://via.placeholder.com/200'}">
        <h3>${p.name}</h3>
        <p>条码: ${p.barcode || "-"}</p>

        <p>
          ${price < p.price ? `<del>RM${p.price}</del> RM${price}` : `RM${price}`}
        </p>

        <p>${status}</p>

        <button onclick="add(${p.id})" ${disabled}>
          ${disabled ? "不可购买" : "加入购物车"}
        </button>
      </div>
    `;
  });
}

function add(id){
  const item = cart.find(i=>i.id===id);
  if(item) item.qty++;
  else cart.push({id,qty:1});
  save(); renderCart();
}

function renderCart(){
  let total=0, count=0;
  const div=document.getElementById("cart");
  div.innerHTML="";

  cart.forEach(i=>{
    const p=products.find(x=>x.id===i.id);
    if(!p) return;

    total+=p.price*i.qty;
    count+=i.qty;

    div.innerHTML+=`
      <div>${p.name} × ${i.qty}</div>`;
  });

  document.getElementById("count").innerText=count;
  document.getElementById("total").innerText="RM"+total;
}

function checkout(){
  alert("下单成功！");
  cart=[]; save(); renderCart();
}

function toggleCart(){
  const box=document.getElementById("cartBox");
  box.style.display = box.style.display==="none"?"block":"none";
}

renderProducts();
renderCart();

</script>

</body>
</html>
