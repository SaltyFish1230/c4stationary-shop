<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<title>C4文具店</title>
</head>

<body>

<h2>🛒 C4文具店</h2>

<div id="notice"></div>

<input id="couponInput" placeholder="优惠码">
<button onclick="applyCoupon()">使用</button>

<div id="products"></div>

<button onclick="checkout()">结账</button>

<script>

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB4c50tn2qusku-vKS_70Aox04q7q3G0kg",
  authDomain: "c4stationary.firebaseapp.com",
  projectId: "c4stationary",
  storageBucket: "c4stationary.firebasestorage.app",
  messagingSenderId: "732705187325",
  appId: "1:732705187325:web:15a9d0536f123fde2aa594",
  measurementId: "G-CJG2GQK4GD"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let products = [];
let cart = [];
let discount = 0;

// 📢 公告
db.collection("notices").onSnapshot(s=>{
  document.getElementById("notice").innerText =
    s.docs[0]?.data().text || "";
});

// 📦 商品
db.collection("products").onSnapshot(s=>{
  products = [];
  const div = document.getElementById("products");
  div.innerHTML="";

  s.forEach(doc=>{
    const p = doc.data();
    p.id = doc.id;
    products.push(p);

    let now = new Date();
    let price = p.price;

    if(p.sale && now>=new Date(p.sale.start) && now<=new Date(p.sale.end)){
      price = p.sale.price;
    }

    let disabled = "";
    let status = "";

    if(p.stock<=0){
      disabled="disabled";
      status="❌ 已售空";
    }

    if(!p.enabled){
      disabled="disabled";
      status="🚫 下架";
    }

    div.innerHTML += `
      <div>
        <img src="${p.img}" width="100"><br>
        ${p.name} (${p.category})<br>
        条码:${p.barcode}<br>

        ${price < p.price ? `<del>${p.price}</del>`:""} RM${price}<br>

        ${status}<br>

        <button onclick="add('${p.id}')" ${disabled}>
          ${disabled?"不可买":"加入购物车"}
        </button>
      </div><hr>
    `;
  });
});

// 🎟 优惠券
async function applyCoupon(){
  const code = document.getElementById("couponInput").value;

  const snap = await db.collection("coupons")
    .where("code","==",code).get();

  if(snap.empty){
    alert("无效");
    return;
  }

  const c = snap.docs[0].data();
  let now = new Date();

  if(now<new Date(c.start) || now>new Date(c.end)){
    alert("过期");
    return;
  }

  discount = c.discount;
  alert("成功");
}

// 🛒 购物车
function add(id){
  let i = cart.find(x=>x.id===id);
  if(i) i.qty++;
  else cart.push({id,qty:1});
}

// 💥 下单（扣库存）
async function checkout(){

  for(let item of cart){
    let ref = db.collection("products").doc(item.id);

    await db.runTransaction(async t=>{
      let doc = await t.get(ref);
      let data = doc.data();

      if(data.stock < item.qty){
        throw "库存不足";
      }

      t.update(ref,{
        stock: data.stock - item.qty
      });
    });
  }

  alert("成功");
  cart=[];
}

</script>

</body>
</html>
